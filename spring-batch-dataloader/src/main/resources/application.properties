spring.application.name=demo

# ----------------------------
# DYNAMIC FLOW BUILDER CONFIG
# ----------------------------
# Control which steps are included in the data import flow
# Set job.enabled=false to skip job execution entirely
job.enabled=true

# Specify which steps to run (comma-separated)
# Options: all, border-crossing, generic-node, pipeline-segment, lng-terminal, gem-data, shipping-lanes
job.steps=shipping-lanes

# Examples:
# job.steps=all                                    # Run all steps in sequence
# job.steps=border-crossing                        # Only border crossing nodes
# job.steps=generic-node                           # Only generic nodes
# job.steps=pipeline-segment                       # Only pipeline segments
# job.steps=border-crossing,generic-node           # Multiple steps


# ----------------------------
# BATCH JOB RUNNER CONFIG (DEPRECATED)
# ----------------------------
### DEPRECATED BUT STILL USABLE FOR TESTING ###
batch.job.border-crossing.enabled=false
batch.job.generic-node.enabled=false
batch.job.pipeline-segment.enabled=false




# Spring Batch Schema Initialization, becuase we use Flyway or cust schema script we don't need to initialize schema
spring.batch.jdbc.initialize-schema=never



# ----------------------------
# DATABASE CONFIGURATION
# ----------------------------
spring.datasource.url=jdbc:postgresql://localhost:5467/spring_batch_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver


app.datasource.url=jdbc:postgresql://localhost:5467/fastapi_db  
app.datasource.username=postgres
app.datasource.password=postgres
app.datasource.driver-class-name=org.postgresql.Driver

pipe.segment.snap-distance-meters=5000