[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
addopts = 
    -v
    -s
    --strict-markers
    --tb=short
    ; --cov=app
    ; --cov-report=term-missing
    ; --cov-report=html

    

## on windows we get the error: "sqlalchemy.exc.InterfaceError: (psycopg.InterfaceError) Psycopg cannot use the 'ProactorEventLoop' 
## to run in async mode. Please use a compatible event loop, for instance by running 'asyncio.run(..., 
## loop_factory=asyncio.SelectorEventLoop(selectors.SelectSelector()))'" 
## Therefore, we set asyncio.set_event_loop_policy(asyncio.WindowsSelectorEventLoopPolicy())
## The current python 3.14 runs fine, but at python 3.16 this will be deprecated, so we add a filter to ignore the deprecation warning for now,
##  and will remove this filter once we drop support for python 3.16
filterwarnings =
    ignore:.*WindowsSelectorEventLoopPolicy.*:DeprecationWarning
    ignore:.*set_event_loop_policy.*:DeprecationWarning

markers =
    integration: Endpoint and service integration tests that run against SQLite
    e2e: End-to-end tests that run against the external Docker database
    unit: Unit tests that don't require database
    slow: Slow running tests
