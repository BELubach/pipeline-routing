[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
addopts = 
    -v
    --strict-markers
    --tb=short
    --cov=app
    --cov-report=term-missing
    --cov-report=html
markers =
    integration: Endpoint and service integration tests that run against SQLite
    e2e: End-to-end tests that run against the external Docker database
    unit: Unit tests that don't require database
    slow: Slow running tests
