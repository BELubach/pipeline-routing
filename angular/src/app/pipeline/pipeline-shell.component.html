<div class="pipeline-shell">
    <nav class="feature-nav">
        <div class="feature-nav__title">
            <h1>Pipeline Maps</h1>
            <p>Switch between the full network view and border crossings only.</p>
        </div>
        <div class="feature-nav__actions">
            <input type="text" placeholder="Search for a node" class="search-bar" />
            <p-button label="Open modal" (click)="openShellDialog()"></p-button>
        </div>
        <div class="feature-nav__links">
            <a routerLink="/pipeline-map/network" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
                Network Map
            </a>
        </div>
    </nav>

    <p-dialog
        header="Edit Profile"
        [modal]="true"
        [visible]="shellDialogVisible()"
        (visibleChange)="shellDialogVisible.set($event)"
        [style]="{ width: '25rem' }">
        <span class="pipeline-dialog__intro">Update your information.</span>
        <div class="pipeline-dialog__field">
            <label for="pipeline-username" class="pipeline-dialog__label">Username</label>
            <input pInputText id="pipeline-username" class="pipeline-dialog__input" autocomplete="off" />
        </div>
        <div class="pipeline-dialog__field">
            <label for="pipeline-email" class="pipeline-dialog__label">Email</label>
            <input pInputText id="pipeline-email" class="pipeline-dialog__input" autocomplete="off" />
        </div>
        <div class="pipeline-dialog__actions">
            <p-button label="Cancel" severity="secondary" (click)="closeShellDialog()"></p-button>
            <p-button label="Save" (click)="saveShellDialog()"></p-button>
        </div>
    </p-dialog>


    <section class="feature-content">
        <router-outlet></router-outlet>
    </section>
</div>
