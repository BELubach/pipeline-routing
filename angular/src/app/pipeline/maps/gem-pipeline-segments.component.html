<div class="map-container">
  <div class="header">
    <h1>GEM Pipeline Network Map</h1>
    
  </div>

  @if (loading) {
    <div class="loading">
      <p>Loading pipeline nodes...</p>
    </div>
  }

  @if (error) {
    <div class="error">
      <p>{{ error }}</p>
    </div>
  }

  <div id="map"></div>

  <div class="stats">
    <p>Displaying {{ displayedNodesCount }} of {{ nodes.length }} nodes</p>
  </div>
</div>
