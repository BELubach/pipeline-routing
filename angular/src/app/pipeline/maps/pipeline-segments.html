<div class="map-container">
  <div class="header">
    <h1>Pipeline Segments</h1>
  </div>

  @if (loading) {
  <div class="loading">
    <p>Loading pipeline segments...</p>
  </div>
  }

  @if (error) {
  <div class="error">
    <p>{{ error }}</p>
  </div>
  }

  <div class="">
    <button (click)="clearRouting()"
    class="bg-blue-500 hover:bg-blue-700 hover:cursor-pointer text-white font-bold py-2 px-4 rounded"
    >Reset</button>

  </div>

  <div id="map"></div>

  <div class="stats">
    <p>Displaying {{ segments.length }} segments with {{ nodes.length }} total nodes</p>
  </div>
</div>
