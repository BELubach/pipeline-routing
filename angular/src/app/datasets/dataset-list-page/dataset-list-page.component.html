<div class="p-4 max-w-5xl mx-auto">

    <div class="flex align-items-center justify-content-between mb-4">
        <h2 class="text-2xl font-bold m-0">Datasets</h2>
    </div>

    @if (datasets().length === 0) {
    <div class="flex justify-content-center align-items-center" style="height: 300px">
        <p-progressSpinner />
    </div>
    } @else {
    <div class="grid grid-cols-3 gap-3">
        @for (dataset of datasets(); track dataset.id) {
        <p-card >
            <div class="flex flex-col align-items-start justify-content-between gap-3">
                <div class="flex align-items-center gap-2 mb-1 cursor-pointer group"
                    [routerLink]="['/datasets', dataset.id]">
                    <a class="text-lg font-semibold text-primary no-underline group-hover:underline">
                        {{ dataset.name }}
                    </a>

                    <p-button severity="secondary" [rounded]="true" size="small"
                        styleClass="max-h-[1.75rem] whitespace-nowrap group-hover:brightness-90">
                        View details
                    </p-button>
                </div>
                <p class="text-color-secondary text-sm line-height-3 m-0 mb-3">{{ dataset.description }}</p>

                <div class="flex align-items-center gap-3 text-sm text-color-secondary ">
                    <span><i class="pi pi-calendar mr-1"></i>{{ dataset.dataset_date }}</span>
                    @if (dataset.website) {
                    <a [href]="dataset.website" target="_blank" rel="noopener noreferrer"
                        class="flex align-items-center gap-1 text-primary no-underline hover:underline">
                        <i class="pi pi-external-link"></i>{{ dataset.source }}
                    </a>
                    }
                </div>
            </div>

        </p-card>
        }
    </div>
    }

</div>
