<div class="min-h-screen flex items-center justify-center bg-sand-100 p-4">
  <div class="w-full max-w-md">
    <p-card class="shadow-2xl rounded-2xl overflow-hidden bg-white border border-sand-200">
      <ng-template pTemplate="header">
        <div class="bg-white text-center py-10 px-6 border-b border-sand-200">
          <div class="w-16 h-16 mx-auto mb-4 rounded-full bg-gradient-to-br from-burgundy-500 to-amber-500 flex items-center justify-center">
            <i class="pi pi-user text-3xl text-white"></i>
          </div>
          <h2 class="text-3xl font-bold mb-2 text-stone-900">Welcome Back</h2>
          <p class="text-stone-600 text-sm">Sign in to continue to your account</p>
        </div>
      </ng-template>

      <div class="p-8">
        @if (errorMessage()) {
          <p-message severity="error" [text]="errorMessage()" styleClass="w-full mb-6" />
        }

        <div class="mb-6">
          <label for="email" class="block text-sm font-semibold text-stone-800 mb-2">Email</label>
          <span class="p-input-icon-left w-full">
            <i class="pi pi-envelope text-stone-400"></i>
            <input
              pInputText
              id="email"
              type="email"
              [(ngModel)]="email"
              placeholder="you@example.com"
              class="w-full pl-10 border-sand-300 focus:border-burgundy-500 focus:ring-burgundy-500"
              [disabled]="loading()"
            />
          </span>
        </div>

        <div class="mb-6">
          <label for="password" class="block text-sm font-semibold text-stone-800 mb-2">Password</label>
          <span class="p-input-icon-left w-full">
            <i class="pi pi-lock text-stone-400"></i>
            <p-password
              id="password"
              [(ngModel)]="password"
              [feedback]="false"
              [toggleMask]="true"
              placeholder="Enter your password"
              styleClass="w-full"
              inputStyleClass="w-full pl-10 border-sand-300 focus:border-burgundy-500 focus:ring-burgundy-500"
              [disabled]="loading()"
            />
          </span>
        </div>

        <div class="flex items-center justify-between mb-6">
          <div class="flex items-center gap-2">
            <p-checkbox
              id="rememberMe"
              [(ngModel)]="rememberMe"
              [binary]="true"
              inputId="remember"
            />
            <label for="remember" class="text-sm text-stone-700 cursor-pointer">Remember me</label>
          </div>
          <a href="#" class="text-sm text-amber-600 hover:text-burgundy-600 font-medium transition-colors">Forgot?</a>
        </div>

        <button
          pButton
          type="button"
          label="Sign In"
          icon="pi pi-sign-in"
          (click)="onLogin()"
          [loading]="loading()"
          class="w-full py-3 text-base font-semibold bg-gradient-to-r from-burgundy-600 to-crimson-600 hover:from-burgundy-700 hover:to-crimson-700 border-0 text-white shadow-lg hover:shadow-xl transition-all"
        ></button>

        <div class="mt-8 text-center">
          <p class="text-sm text-stone-600">
            Don't have an account? 
            <a href="#" class="text-burgundy-600 hover:text-burgundy-700 font-semibold hover:underline transition-colors ml-1">Sign up</a>
          </p>
        </div>
      </div>
    </p-card>
  </div>
</div>
