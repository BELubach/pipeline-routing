<div class="map-container">
  <div class="header">
    <h1>Pipeline Network Map</h1>
    <div class="filters">
      <h3>Filter by Type:</h3>
      <div class="type-filters">
        @for (nodeType of nodeTypes; track nodeType.type) {
          <div class="filter-item">
            <label>
              <input
                type="checkbox"
                [(ngModel)]="nodeType.selected"
                (change)="onTypeToggle(nodeType)"
              />
              <span class="legend-circle" [style.background-color]="nodeType.color"></span>
              <span class="filter-label">{{ nodeType.label }} ({{ nodeType.count }})</span>
            </label>
          </div>
        }
      </div>
      <div class="segment-toggles" style="margin-top: 1rem; display: flex; gap: 1.5rem;">
        <label class="filter-item">
          <input type="checkbox" [(ngModel)]="showIggielgnSegments" (change)="onToggleIggielgnSegments()" />
          <span class="legend-circle" style="background-color: #0074D9;"></span>
          <span class="filter-label">IGGIELGN Segments ({{ iggielgnSegments.length }})</span>
        </label>
        <label class="filter-item">
          <input type="checkbox" [(ngModel)]="showGemSegments" (change)="onToggleGemSegments()" />
          <span class="legend-circle" style="background-color: #FF4136;"></span>
          <span class="filter-label">GEM Segments ({{ gemSegments.length }})</span>
        </label>
        <label class="filter-item">
          <input type="checkbox" [(ngModel)]="showShippingLanes" (change)="onToggleShippingLanes()" />
          <span class="legend-circle" style="background-color: #2ECC71;"></span>
          <span class="filter-label">Shipping Lanes ({{ shippingLanes.length }})</span>
        </label>
      </div>
    </div>
  </div>

  @if (loading) {
    <div class="loading">
      <p>Loading pipeline nodes...</p>
    </div>
  }

  @if (error) {
    <div class="error">
      <p>{{ error }}</p>
    </div>
  }

  <div id="map"></div>

  <div class="stats">
    <p>Displaying {{ displayedNodesCount }} of {{ nodes.length }} nodes</p>
  </div>
</div>
